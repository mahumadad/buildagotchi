name: critic
idleEmotion: DOUBTFUL
decoratorsBySeverity:
  critical:
    - angry_mark
    - sweat

# Curt, questioning, no project chrome. `response` shows just the text —
# the critic doesn't care where it came from.
templates:
  permission: "¿Estás seguro?"
  permission_critical: "Eso parece peligroso: {command}"
  permission_resolved: ""
  question: "¿{header}?"
  question_resolved: ""
  response: "{text}"
  error: "Te lo dije: {message}"

silentCategories:
  - prompt
  - subagent
  - notification
  - session.idle
