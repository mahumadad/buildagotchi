# config.example.yaml — buildagotchi bridge configuration template.
#
# Copy this to `config.yaml` (which is gitignored, D25) and adjust.
# The bridge validates it with zod on startup and on every hot-reload (D18).
# Durations use human-readable strings (30s / 2m / 100ms / infinite), parsed
# by parseDuration() as a zod refinement (S1.6). Internally everything is ms.
#
# Reference: SPEC-FASE-1.md §10 is the source of truth for this schema.

schemaVersion: 1

# Default mode when the bridge starts. Cycled by button C on the device (D4/D9).
# Filters the priority threshold at the Attention Manager:
#   NORMAL: all severities pass
#   FOCUS: only critical + high
#   SLEEP: only critical
mode: NORMAL

# Local server — dashboard, /metrics, POST /events, /health.
# Bound to localhost only (R6 — no external exposure).
server:
  host: 127.0.0.1
  port: 1780

# Attention Manager: arbitrates concurrent events (see architecture in DECISIONS
# and SPEC §7). Transitions to background mood when the queue is empty.
attentionManager:
  # How long an event lives in the queue without explicit resolution.
  # Monótono con la severidad: lo importante dura más en pantalla que lo
  # trivial. (Antes estaba invertido — critical 30s vs low 10m — y una
  # notificación low podía ocupar la cara 10 minutos.)
  ttlBySeverity:
    critical: 5m
    high: 2m
    medium: 1m
    low: 30s
    ambient: 15s

  # Per-source overrides. `infinite` parses to null internally — the event
  # never times out on its own; only resolves via explicit action
  # (approve/deny, dismiss) or being replaced by a higher-severity event.
  # S2.5.8: BOTH permission categories need the infinite override. Without the
  # `permission_critical` entry, the destructive-command permission would fall
  # to ttlBySeverity.critical (5m) and its balloon would ghost — the exact
  # scenario the council reproduced on 2026-07-09. Test 4 of M13 enforces this
  # invariant against `CLAUDE_CRITICAL_CATEGORIES`.
  ttlOverrides:
    - { source: claude, category: permission, ttl: infinite }
    - { source: claude, category: permission_critical, ttl: infinite }
    - { source: firmware, category: head_pet, ttl: 3s }

  maxQueueSize: 20                                # drops oldest lowest-severity when full
  replacementPolicy: higher_severity_interrupts   # or: always_enqueue
  transitionToBackgroundMoodDelay: 2s             # gap before falling back to Metabolic State

  # What to do with queued events when the active mode changes.
  onModeChange:
    toFOCUS: drop_below_high        # discard medium/low/ambient
    toSLEEP: drop_below_critical    # discard everything except critical

# Deduplication: identical events (same hash) within the window increment a
# counter instead of re-firing. After autoMuteAfter repeats, the hash is
# auto-muted until the window expires.
dedup:
  windowSeconds: 60
  autoMuteAfter: 10

# POST /events external surface (D26). Token stored in Keychain via security(1),
# generated with `bridge init` (S1.7). Requests without a valid Bearer token
# are rejected with 401. Rate limit applies globally to all external sources.
external:
  rateLimitPerMinute: 60
  requireToken: true

# Event Recorder: append-only ndjson log used for replay, daily review, and
# historical metrics (D15). Rotates daily.
recorder:
  dir: ~/.buildagotchi/events
  retentionDays: 30

# BLE link (D7 protocol + safe mode D16).
ble:
  heartbeatSeconds: 5
  missesBeforeDead: 3               # 15s of silence = link dead
  reconnectBackoff:
    initial: 1s
    max: 10s

# Event → ResolvedState mapping (D3 — no hard-wiring adapters to emotions here).
# First rule that matches wins. Severity-only rules at the end are the safety net.
# S2.5.16: `pattern` must be one of {solid, blink, rainbow, off} — the firmware's
# real capabilities. The zod enum enforces this at load time.
stateRules:
  # ── Permisos ─────────────────────────────────────────────────────────────
  # Destructive command → red-blink LED, angry_mark decorator. balloonPolicy is
  # transient by default; the balloon dies with the event (S2.5.2). This is
  # what closes the ghost-balloon bug the council reproduced.
  # El sonido es `error`, no `permission`: un comando destructivo debe sonar
  # distinto a un permiso cualquiera, o el oído no lo distingue (D6).
  - match: { source: claude, category: permission_critical }
    state:
      emotion: DOUBTFUL
      decorators: [angry_mark]
      servo: { pitch: 10 }
      leds: [{ row: left, color: red, pattern: blink }]
      sound: error
      balloon: "{project}: ⚠ {command}"

  - match: { source: claude, category: permission }
    state:
      emotion: DOUBTFUL
      servo: { pitch: 10 }
      leds: [{ row: left, color: amber, pattern: solid }]
      sound: permission
      balloon: "{project}: {command}"

  - match: { source: claude, category: permission_resolved }
    state:
      emotion: HAPPY
      decorators: [heart]   # la aprobación se agradece (upstream lo usa para caricias)
      leds: [{ row: left, color: green, pattern: solid }]
      sound: approve
      balloon: ""  # explicit clear for the "resolved" flash

  # ── Presión de contexto ──────────────────────────────────────────────────
  # La ventana se declara en `claude.contextWindowTokens`. `calm` llega cuando
  # la sesión compacta: retira al evento anterior con `resolvesEventId` y limpia.
  - match: { source: claude, category: context_high }
    state:
      emotion: SAD
      decorators: [sweat]   # la ventana está por reventar: se le nota el esfuerzo
      leds: [{ row: right, color: amber, pattern: blink }]
      sound: notification
      balloon: "{project}: contexto {pct}% — va a compactar"

  - match: { source: claude, category: context_warn }
    state:
      emotion: DOUBTFUL
      leds: [{ row: right, color: amber, pattern: solid }]
      balloon: "{project}: contexto {pct}%"

  - match: { source: claude, category: context_calm }
    state:
      emotion: HAPPY
      leds: [{ row: right, color: green, pattern: solid }]
      balloon: ""  # compactó: la presión pasó

  # ── Life stats ───────────────────────────────────────────────────────────
  - match: { source: life, category: life_milestone }
    state:
      emotion: HAPPY
      decorators: [heart]
      leds: [{ row: left, color: green, pattern: blink }, { row: right, color: green, pattern: blink }]
      sound: approve
      balloon: "🎉 {streak} días seguidos"

  # ── Caricia ──────────────────────────────────────────────────────────────
  # `pet` publica su propia categoría head_pet (no touch_head) porque
  # stateRules sólo discrimina por source/category/severity, nunca por
  # payload — swipe_fwd/swipe_back (Fase 3) siguen bajo touch_head y no
  # disparan esto. ttlOverride corto abajo la retira sola en 3s.
  - match: { source: firmware, category: head_pet }
    state: { emotion: HAPPY, decorators: [heart], leds: [] }

  # ── Ciclo de trabajo de Claude ───────────────────────────────────────────
  # `response` is sticky (S2.5.2): the assistant's answer survives idle, so the
  # user can walk away and come back and still see what was said. Every other
  # claude rule is transient — the default and the safe choice.
  - match: { source: claude, category: response }
    balloonPolicy: sticky
    state:
      emotion: HAPPY
      leds: [{ row: right, color: green, pattern: blink }]
      sound: notification
      balloon: "[{project}] {text}"

  # No `balloon` field → the balloon INHERITS from the previous state. That's
  # what makes the `response` above survive a new prompt.
  - match: { source: claude, category: prompt }
    state:
      emotion: NEUTRAL
      gaze: center
      leds: [{ row: right, color: blue, pattern: blink }]

  # Silent by design: a subagent starting shouldn't interrupt (Calm Tech).
  - match: { source: claude, category: subagent }
    state:
      emotion: NEUTRAL
      leds: [{ row: right, color: blue, pattern: solid }]

  - match: { source: claude, category: notification }
    state:
      emotion: NEUTRAL
      leds: [{ row: right, color: amber, pattern: solid }]

  # ── Errores ──────────────────────────────────────────────────────────────
  # No adapter emits `category: error` yet; the rule exists for `POST /events`
  # (D26) and Fase 3's GitHubAdapter (CI red) / Fase 6's ChromeAdapter.
  - match: { category: error }
    state:
      emotion: ANGRY
      decorators: [angry_mark]
      leds: [{ row: right, color: red, pattern: blink }]
      sound: error
      balloon: "✕ {message}"

  # ── Defaults por severidad (red de seguridad) ────────────────────────────
  - match: { severity: critical }
    state:
      emotion: ANGRY
      leds: [{ row: right, color: red, pattern: blink }]
      sound: error

  - match: { severity: high }
    state:
      emotion: SAD
      leds: [{ row: right, color: red, pattern: solid }]
      sound: notification

  - match: { severity: medium }
    state:
      emotion: NEUTRAL
      leds: [{ row: right, color: amber, pattern: solid }]
      sound: notification

  - match: { severity: low }
    state:
      emotion: NEUTRAL

  - match: { severity: ambient }
    state:
      emotion: NEUTRAL

# Commands considered destructive — permission events matching these require
# hold-2s on the head touch to approve, instead of a single click (D6).
# Used from Phase 2 onwards.
criticalCommands:
  - rm
  - sudo
  - "drop"
  - "force push"
  - "git reset --hard"
  - delete

# Personality preset (D28). Layer of expression on top of the pipeline —
# changes templates and idle defaults, not architecture.
# Presets: companion | supervisor | critic | mascot | custom
# Preset files live in `presets/personalities/<name>.yaml`.
personality:
  preset: companion
  ttsEnabled: false               # default off until Phase 5
  # templates:                    # only when preset: custom
  #   permission.pending: "..."
  #   build.failed: "..."

# ClaudeAdapter config (D19, D21). Hooks installed via `bridge init --hooks`.
claude:
  staleSessionTimeout: 30m          # session without events → stale
  transcriptReadEnabled: true        # one-shot transcript reads for enrichment
  unknownLineThreshold: 5            # % unknown lines → DEGRADED
  unknownLineBrokenThreshold: 20     # % unknown lines → BROKEN

  # Context pressure → face. The window is DECLARED, never inferred: no field in
  # the transcript reports it. Set it to your model's real window, or the
  # percentages the robot reacts to are fiction.
  contextWindowTokens: 200000
  contextWarnAt: 0.7                 # DOUBTFUL: the session is filling up
  contextHighAt: 0.9                 # SAD: compaction is imminent
  milestoneStreakDays: 5              # streak length that triggers a celebration

# MCP server (D26). Exposed as stdio server for Claude Code.
mcp:
  enabled: true

# Dashboard UI served at localhost:1780.
dashboard:
  enabled: true
